<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonny Angel Collection Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #fdf8f8;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #f0e0e6;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 400;
      color: #1a1a1a;
    }

    header .subtitle {
      font-size: 13px;
      color: #888;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-bottom: 1.75rem;
    }

    .stat {
      background: #fff;
      border: 1px solid #f0e0e6;
      border-radius: 10px;
      padding: 14px 16px;
    }

    .stat-label {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 500;
      color: #1a1a1a;
    }

    .stat-value.green { color: #1D9E75; }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 1.25rem;
    }

    .search input {
      width: 100%;
      padding: 9px 14px;
      font-size: 14px;
      border-radius: 8px;
      border: 1px solid #e8d5dc;
      background: #fff;
      color: #1a1a1a;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }

    .search input:focus { border-color: #D4537E; }

    .filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-size: 12px;
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid #e8d5dc;
      background: transparent;
      cursor: pointer;
      color: #888;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: #D4537E; color: #D4537E; }

    .filter-btn.active {
      background: #D4537E;
      color: #fff;
      border-color: #D4537E;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 12px;
    }

    .card {
      background: #fff;
      border: 1px solid #f0e0e6;
      border-radius: 12px;
      padding: 0.875rem;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      position: relative;
      user-select: none;
    }

    .card:hover { border-color: #D4537E; box-shadow: 0 2px 12px rgba(212,83,126,0.08); }
    .card.owned { border-color: #1D9E75; }

    .card-img {
      width: 100%;
      aspect-ratio: 1/1;
      border-radius: 8px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-size: 36px;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 8px;
    }

    .card-name {
      font-weight: 500;
      font-size: 13px;
      color: #1a1a1a;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-series { font-size: 11px; color: #999; margin-bottom: 6px; }

    .card-footer { display: flex; justify-content: space-between; align-items: center; }

    .card-price { font-size: 14px; font-weight: 500; color: #D4537E; }

    .card-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; }
    .badge-secret { background: #FAEEDA; color: #633806; }
    .badge-standard { background: #FBEAF0; color: #993556; }

    .year-tag { font-size: 10px; color: #bbb; margin-top: 4px; }

    .owned-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      margin-top: 6px;
      color: #1D9E75;
    }

    .owned-dot { width: 6px; height: 6px; border-radius: 50%; background: #1D9E75; }

    .owned-tick {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 20px;
      height: 20px;
      background: #1D9E75;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 11px;
    }

    .no-results {
      text-align: center;
      padding: 4rem;
      color: #bbb;
      font-size: 14px;
      grid-column: 1 / -1;
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 12px;
      color: #ccc;
      margin-top: 2rem;
    }

    @media (max-width: 600px) {
      header { padding: 1rem; }
      main { padding: 1rem; }
      .cards-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
    }
  </style>
</head>

    {s:"Vegetable",n:"Cauliflower",sec:false,yr:"2019",p:15,img:"https://www.sonnyangel.com/renewal/wp-content/uploads/2019/10/Cauliflower.png"},
    {s:"Vegetable",n:"Cabbage",sec:false,yr:"2019",p:15,img:"https://www.sonnyangel.com/renewal/wp-content/uploads/2019/10/Cabbage.png"},
    {s:"Vegetable",n:"Shiitake",sec:true,yr:"2019",p:100,img:null},
    {s:"Vegetable",n:"Robby",sec:true,yr:"2019",p:50,img:null},

    {s:"Sweets",n:"Pancake",sec:false,yr:"2017",p:15,img:"https://www.sonnyangel.com/renewal/wp-content/uploads/2018/10/SA_pancake_01.jpg"},
    {s:"Sweets",n:"Popcorn",sec:false,yr:"2017",p:15,img:"https://www.sonnyangel.com/renewal/wp-content/uploads/2018/10/SA_popcorn_01.jpg"},
    {s:"Sweets",n:"Pudding",sec:false,yr:"2017",p:15,img:"https://www.sonnyangel.com/renewal/wp-content/uploads/2018/10/SA_pudding_01.jpg"},
    {s:"Sweets",n:"Candy",sec:false,yr:"2017",p:15,img:"https://www.sonnyangel.com/renewal/wp-content/uploads/2018/10/SA_candy_01.jpg"},
    {s:"Sweets",n:"Fruit Tart",sec:false,yr:"2017",p:15,img:"https://www.sonnyangel.com/renewal/wp-content/uploads/2018/10/SA_fruittart_01.jpg"},
    {s:"Sweets",n:"Ice Creams",sec:false,yr:"2017",p:15,img:"https://www.sonnyangel.com/renewal/wp-content/uploads/2018/10/SA_icecreams_01.jpg"},
    {s:"Sweets",n:"Jelly Beans",sec:false,yr:"2017",p:15,img:"https://www.sonnyangel.com/renewal/wp-content/uploads/2018/10/SA_jellybeans_01.jpg"},
    {s:"Sweets",n:"Konpeito",sec:false,yr:"2017",p:15,img:"https://www.sonnyangel.com/renewal/wp-content/uploads/2018/10/SA_konpeito_01.jpg"},
    {s:"Sweets",n:"Cookie",sec:false,yr:"2017",p:15,img:"https://www.sonnyangel.com/renewal/wp-content/uploads/2018/10/SA_cookie_01.jpg"},
    {s:"Sweets",n:"Strawberry Shortcake",sec:false,yr:"2017",p:15,img:"https://www.sonnyangel.com/renewal/wp-content/uploads/2018/10/SA_strawberryshortcake_01.jpg"},
    {s:"Sweets",n:"Patissier",sec:true,yr:"2017",p:100,img:null},
    {s:"Sweets",n:"Robby",sec:true,yr:"2017",p:50,img:null},
  ].map((f, i) => ({...f, idx: i}));

  const seriesEmoji = {
    "Animal V1":"🐰","Animal V2":"🐭","Animal V3":"🦜","Animal V4":"🦁",
    "Marine":"🐠","Fruit":"🍓","Flower":"🌸","Vegetable":"🥕","Sweets":"🍰"
  };

  const allSeries = [...new Set(figures.map(f => f.s))];
  let ownedSet = new Set();
  let activeFilter = 'All';

  // Build filter buttons
  const filterRow = document.getElementById('filterRow');
  ['All', 'Owned', 'Wanted', 'Secret', ...allSeries].forEach((f, i) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (i === 0 ? ' active' : '');
    btn.textContent = f;
    btn.onclick = function() { setFilter(f, btn); };
    filterRow.appendChild(btn);
  });

  function updateStats() {
    const val = figures.filter(f => ownedSet.has(f.idx)).reduce((sum, f) => sum + f.p, 0);
    document.getElementById('statOwned').textContent = ownedSet.size;
    document.getElementById('statValue').textContent = '£' + val.toLocaleString();
  }

  function setFilter(filter, btn) {
    activeFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterCards();
  }

  function toggleOwned(idx) {
    if (ownedSet.has(idx)) ownedSet.delete(idx);
    else ownedSet.add(idx);
    updateStats();
    filterCards();
  }

  function filterCards() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = figures.filter(f => {
      const ms = f.n.toLowerCase().includes(q) || f.s.toLowerCase().includes(q);
      const mf =
        activeFilter === 'All' ? true :
        activeFilter === 'Owned' ? ownedSet.has(f.idx) :
        activeFilter === 'Wanted' ? !ownedSet.has(f.idx) :
        activeFilter === 'Secret' ? f.sec :
        f.s === activeFilter;
      return ms && mf;
    });

    const grid = document.getElementById('cardsGrid');
    if (!filtered.length) {
      grid.innerHTML = '<div class="no-results">No figures found</div>';
      return;
    }

    grid.innerHTML = filtered.map(f => {
      const isOwned = ownedSet.has(f.idx);
      const bg = f.sec ? '#FAEEDA' : '#FBEAF0';
      const imgHtml = f.img
        ? `<img src="${f.img}" alt="${f.n}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><span style="display:none;font-size:36px;width:100%;height:100%;align-items:center;justify-content:center;background:${bg};border-radius:8px">${seriesEmoji[f.s]||'🎀'}</span>`
        : `<span style="font-size:36px;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:${bg};border-radius:8px">${seriesEmoji[f.s]||'🎀'}</span>`;

      return `
        <div class="card${isOwned ? ' owned' : ''}" onclick="toggleOwned(${f.idx})">
          ${isOwned ? '<div class="owned-tick">✓</div>' : ''}
          <div class="card-img" style="background:${bg}">${imgHtml}</div>
          <div class="card-name" title="${f.n}">${f.n}</div>
          <div class="card-series">${f.s}</div>
          <div class="card-footer">
            <span class="card-price">£${f.p}</span>
            <span class="card-badge ${f.sec ? 'badge-secret' : 'badge-standard'}">${f.sec ? 'Secret' : 'Standard'}</span>
          </div>
          <div class="year-tag">${f.yr}</div>
          ${isOwned ? '<div class="owned-badge"><span class="owned-dot"></span> In collection</div>' : ''}
        </div>`;
    }).join('');
  }

  filterCards();
</script>
